# Content + advisory rules enforced by the write-rules check on
# Edit / MultiEdit / Write tool calls.
#
# Each rule:
#   type:              "block"      — deny tool call every time.
#                      "block_once" — deny on first hit per session, allow
#                                     silently on retry (escape hatch for
#                                     legitimate uses).
#                      "warn"       — inject context. Honours once_per_session.
#   files:             Globs (relative to project root, ** supported).
#   pattern:           Optional Ruby regex matched against the new content.
#                      Omit to fire on file-glob match alone.
#   context:           Static message returned to Claude (may be overridden by
#                      a detector).
#   once_per_session:  Optional, warn-only. When true the rule fires at most
#                      once per session (sentinel under tmp/.claude-advisory/).
#                      Block rules ignore this flag; use block_once instead.
#
# Per-rule detection logic lives in detectors/<rule_name>.rb. Without a
# detector, the rule fires whenever its files glob (and optional pattern)
# match. A detector may override the context message for a given fire.
#
# Rule names must be unique across write.yml AND read.yml — both scripts
# share the same per-session sentinel namespace.

no_default_scope:
  type: block
  pattern: '(?<!\w)default_scope(?!\w)'
  files:
    - 'app/models/**/*'
  context: >
    We do not allow default scopes to be used. Depending on your use-case
    consider using something like `active`, `inactive` and `all` with
    enforcement at the call sites instead.

service_call_idiom:
  type: block_once
  pattern: '^\s*def\s+(self\.)?call\b'
  files:
    - 'app/models/**/*.rb'
    - 'app/services/**/*.rb'
  context: >
    You're defining `def call` / `def self.call` — the canonical
    service-object idiom. Run the DDD check before proceeding. (1) Does
    this class coordinate behavior across multiple aggregates? If it just
    wraps save/update/create on a single model, push the logic onto the
    model (or a callback / concern). (2) The class name should read as a
    domain action; if you're reaching for `call` to make a noun feel like
    a verb, the abstraction is probably misplaced. (3) `def self.call`
    that just forwards to `new(...).call` is pure ceremony — callers can
    write `Klass.new(args).call` directly, which keeps the keyword
    signature in one place. If `call` is required to satisfy an external
    callable interface (framework contract, library expectation,
    background-job interface), the override is legitimate.

service_design_advisory:
  type: warn
  once_per_session: true
  context: >
    You are creating or editing a service object. STOP and verify this belongs
    here. Services in app/services/ must encapsulate meaningful cross-aggregate
    domain operations (DDD). If this service only wraps .save, .update, or
    .create on a single model, it belongs in the model or controller — not here.
    Ask: does this coordinate behavior across multiple models/aggregates, or
    just wrap save/update/create? If it's the latter, move the logic closer to
    the model. Also consider: could this be a model method, a callback, or a
    concern instead?
  files:
    - 'app/services/**/*'

model_wrapper_delegation:
  type: warn
  once_per_session: true
  pattern: '^\s*def\s+\w+'
  files:
    - 'app/models/*.rb'

migration_design_advisory:
  type: warn
  once_per_session: true
  context: >
    Editing a migration. STOP and confirm before proceeding: (1) PERSISTENCE
    NECESSARY? Walk the data's lifecycle — ephemeral (params), session, user
    pref (jsonb), or genuine domain state. If it's transient, do not persist;
    ask the user if unsure. (2) BOOLEAN? Only for a real two-state flag with no
    foreseeable third state. Prefer status enums or timestamps (e.g.
    activated_at, archived_at) — they carry more information and leave room to
    grow. (3) NAMING — drop the table-name prefix on columns (e.g.
    users.user_name → users.name). Apply the same rule to associations.
    (4) ARRAY/JSONB — flexible but not query-friendly; reach for a join table
    if you'll ever filter or count by individual entries. (5) BACKFILL — never
    combine a NOT NULL add + data backfill in one migration on an existing
    table.
  files:
    - 'db/migrate/**/*.rb'

migration_backfill:
  type: warn
  context: >
    This migration adds a NOT NULL constraint AND backfills data in the same
    file. On an existing table that locks the table and can fail mid-deploy.
    Split it: (1) add the column nullable, (2) backfill in a separate migration
    or job, (3) add the NOT NULL constraint once data is populated. If the table
    is brand new in this same migration, ignore this nudge.
  files:
    - 'db/migrate/**/*.rb'

migration_missing_fk_index:
  type: warn
  context: >
    This migration adds a foreign-key column or reference without an index.
    Unindexed FKs make joins and association lookups slow and cause lock
    contention on delete. Add the index in this same migration —
    add_index :table, :foo_id, or add_reference ..., index: true.
  files:
    - 'db/migrate/**/*.rb'

ruby_vs_sql:
  type: warn
  pattern: '\.all\.(map|select|reject|each)\b'
  context: >
    `.all.map` / `.all.select` / `.all.reject` / `.all.each` loads every row of
    the table into Ruby before filtering or transforming it. Push the work into
    SQL: use a scope, where/pluck/select(:col), or find_each for batched
    iteration. If you genuinely need every record materialised, make that
    explicit and ignore this nudge.
  files:
    - 'app/models/**/*.rb'
    - 'app/controllers/**/*.rb'

view_query_logic:
  type: warn
  pattern: '\b[A-Z]\w*\.(find|where|all|order|joins|pluck|count|sum)\b'
  context: >
    This view queries a model directly (e.g. Model.where / Model.find). Views
    should render data the controller or a presenter already prepared — query
    logic in templates is untestable, runs on every render, and hides N+1s.
    Move the query into the controller, a scope, or a presenter and pass the
    result in.
  files:
    - '**/*.erb'

spec_let_fixture_nudge:
  type: warn
  once_per_session: true
  pattern: '^\s*let!?\('
  files:
    - 'spec/**/*.rb'
  context: >
    You're adding `let` / `let!` in a spec. Pause on heavy `let` / `let!`
    setup and consider shared test setup instead. When a `let` block builds
    persistent, multi-record, cross-aggregate state — many associated records,
    or any multi-model construction — pull it into shared setup that stays
    consistent across specs: a FactoryBot factory or trait, a fixture, a
    shared_context, or a support helper. Reserve `let` for small in-memory
    values, per-test variation, and one-off test doubles. If reusable setup
    like this doesn't exist yet, add it rather than repeating the construction
    inline.

# ── Security ────────────────────────────────────────────────────────────────

sql_injection:
  type: block_once
  pattern: '\b(where|having|group|order|reorder|find_by_sql|exists\?|select|joins|pluck)\(\s*"[^"]*#\{'
  files:
    - 'app/**/*.rb'
    - 'lib/**/*.rb'
  context: >
    SQL string interpolation in a query method — `#{...}` inside a double-quoted
    SQL fragment — is a SQL-injection vector. Use bind parameters instead:
    where("name = ?", name) or where("name = :name", name: name). A single-quoted
    string does not interpolate, so it is not flagged. If you are interpolating a
    trusted, non-user value (a constant column or table name), re-issue the edit
    to proceed.

# ── Rails antipatterns ──────────────────────────────────────────────────────

bare_rescue:
  type: warn
  pattern: 'rescue[ \t]*(=>|$)|rescue[ \t]+nil\b'
  files:
    - 'app/**/*.rb'
    - 'lib/**/*.rb'
  context: >
    Bare rescue — `rescue` with no exception class, or `rescue nil` — swallows
    every StandardError, including ones you did not anticipate, and hides real
    failures (the "fire and forget" antipattern). Rescue the specific class you
    expect (rescue Net::ReadTimeout => e) and let everything else surface. If you
    must catch broadly, log or re-raise rather than silently discarding.

migration_model_reference:
  type: warn
  pattern: '\b[A-Z]\w*\.(all|where|find_by|find_each|find_in_batches|find|in_batches|pluck|update_all|update|delete_all|destroy_all|count|create)\b'
  files:
    - 'db/migrate/**/*.rb'
  context: >
    This migration references a model class (e.g. User.where / Model.find_each).
    Migrations run against a historical schema but load *current* model code — when
    the model changes or is deleted, the migration breaks and can no longer be
    replayed. Operate on raw tables instead: execute SQL, or define a throwaway
    class inline (class MigrationUser < ActiveRecord::Base; self.table_name =
    "users"; end). For large backfills, prefer a separate data migration or job.

missing_http_timeout:
  type: warn
  pattern: 'Net::HTTP|Faraday|HTTParty|RestClient|Typhoeus|Excon'
  files:
    - 'app/**/*.rb'
    - 'lib/**/*.rb'
  context: >
    This code calls an external HTTP service with no timeout in sight. Without one,
    a slow or hung endpoint ties up the request (or job) until the client's default
    — often 60s, sometimes never — cascading into thread-pool exhaustion. Set both
    open_timeout and read_timeout on the client. If the timeout is configured
    centrally (an initializer or a wrapper class this file can't see), ignore this
    nudge.

validates_uniqueness_no_index:
  type: warn
  pattern: 'uniqueness|validates_uniqueness_of'
  files:
    - 'app/models/**/*.rb'
  context: >
    This model validates uniqueness without a backing unique index. The validation
    runs a SELECT before INSERT, so two concurrent requests can both pass it and
    both write — a duplicate slips through. Add a database unique index
    (add_index :table, :col, unique: true) so the constraint is enforced at the DB
    level, not just in Ruby.

# ---------------------------------------------------------------------------
# Optional: Sorbet inline RBS. Commented out because it only makes sense in a
# project that types Ruby with Sorbet's inline RBS comments
# (`--enable-experimental-rbs-comments`), and it fires on EVERY `def` added in
# app/ or lib/, which in a non-Sorbet app is constant noise pointing at tooling
# that isn't there. Uncomment to enable. Its detector ships ready at
# detectors/sorbet_inline_rbs_advisory.rb, and it hands off to the bundled
# `/rulekit:sorbet-inline-rbs` skill.
#
# sorbet_inline_rbs_advisory:
#   type: warn
#   once_per_session: true
#   context: >
#     This Ruby change adds a method without a Sorbet inline RBS signature (or
#     creates a file without a `# typed:` sigil). The full conventions are long,
#     so don't pull them in here to sign it inline. Instead dispatch a subagent
#     (the Task tool) to do the typing: have it read the /rulekit:sorbet-inline-rbs
#     skill, add inline RBS signatures to the methods in this file, run
#     `bundle exec srb tc` until it passes, and report back a one-line summary.
#     That keeps the conventions and the srb tc loop out of your context. For a
#     single trivial method it's fine to sign it inline from
#     /rulekit:sorbet-inline-rbs instead, with no blank line between the `#:` and
#     its `def`. If the file is intentionally untyped (generated, vendored, a
#     spec), ignore this nudge.
#   files:
#     - 'app/**/*.rb'
#     - 'lib/**/*.rb'
